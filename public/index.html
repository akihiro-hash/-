<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>勤怠管理</title>
    <style>
      :root {
        color: #2d2520;
        background: #faf7f1;
        font-family: "Segoe UI", system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(circle at top left, rgba(255, 230, 190, 0.42), transparent 32%), #faf7f1;
      }
      main {
        width: min(460px, 100%);
        background: white;
        border: 1px solid #eadfce;
        border-radius: 8px;
        padding: 28px;
        box-shadow: 0 8px 22px rgba(65, 46, 30, 0.06);
      }
      p:first-child {
        color: #2f7d68;
        font-size: 0.8rem;
        font-weight: 700;
        text-transform: uppercase;
      }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 10px 14px;
        border-radius: 6px;
        background: #2f7d68;
        color: white;
        font-weight: 700;
        text-decoration: none;
      }
      .muted {
        color: #756a60;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Attendance Manager</p>
      <h1>勤怠管理</h1>
      <p class="muted">公開ページは表示できています。アプリ本体へ進みます。</p>
      <a href="/login">ログイン画面へ</a>
    </main>
  </body>
</html>
